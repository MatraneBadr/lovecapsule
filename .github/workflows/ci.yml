name: Mon pipeline backend

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v3

      - name: Installer .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '6.0.x'
        
      - name: Build
        run: dotnet build
        
      - name: Build Docker image
        run: docker build -t lovecapsule-api .
        
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Tag image
        run: docker tag lovecapsule-api matraneBadr/lovecapsule-api:latest

      - name: Push image
        run: docker push matraneBadr/lovecapsule-api:latest